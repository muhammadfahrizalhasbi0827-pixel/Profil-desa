<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tautan Resmi Profil Desa</title>
    <!-- Google Fonts untuk tipografi yang rapi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk ikon sosial media -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2e7d32; /* Hijau khas desa/alam */
            --text-dark: #2c3e50;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Bagian Profil */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .profile-subtitle {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Bagian Tautan */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* Gaya Khusus untuk Masing-masing Tombol */
        .btn-website {
            background-color: var(--primary-color);
            color: #ffffff;
        }
        .btn-website:hover {
            background-color: #1b5e20;
            transform: translateY(-2px);
        }

        .btn-instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            color: #ffffff;
        }
        .btn-instagram:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-tiktok {
            background-color: #010101;
            color: #ffffff;
        }
        .btn-tiktok:hover {
            background-color: #252525;
            transform: translateY(-2px);
        }

        .btn-youtube {
            background-color: #FF0000;
            color: #ffffff;
        }
        .btn-youtube:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: #ffffff;
        }
        .btn-whatsapp:hover {
            background-color: #1ebd59;
            transform: translateY(-2px);
        }

        .btn-maps {
            background-color: #4285F4; /* Google Blue */
            color: #ffffff;
        }
        .btn-maps:hover {
            background-color: #357ae8;
            transform: translateY(-2px);
        }

        /* Icon styling */
        .link-btn i {
            font-size: 1.3rem;
            width: 30px;
            text-align: left;
        }

        .arrow-icon {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo atau Foto Profil Desa -->
        <img src="Logo Desa.jpg" alt="Logo Desa" class="profile-img">

        <!-- Informasi Desa -->
        <h1 class="profile-name">Desa Makmur Jaya</h1>
        <p class="profile-subtitle">Layanan Informasi Terpadu dan Media Sosial Resmi Pemerintah Desa Makmur Jaya</p>

        <!-- Daftar Tautan -->
        <div class="links-wrapper">
            
            <!-- Tautan Profil Desa / Website -->
            <a href="profil desa/profil desa.html" target="_blank" class="link-btn btn-website">
                <span><i class="fa-solid fa-globe"></i> Profil & Web Desa</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <!-- Tautan Instagram -->
            <a href="https://instagram.com/Desawisata AGRO TECHNOPARK" target="_blank" class="link-btn btn-instagram">
                <span><i class="fa-brands fa-instagram"></i> Instagram Resmi</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <!-- Tautan YouTube -->
            <!-- Silakan ganti href di bawah ini dengan tautan channel YouTube desa Anda -->
            <a href="https://youtube.com/@BATULICINIRIGASI" target="_blank" class="link-btn btn-youtube">
                <span><i class="fa-brands fa-youtube"></i> YouTube Resmi</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <!-- Tautan TikTok -->
            <a href="https://tiktok.com/@username-desa" target="_blank" class="link-btn btn-tiktok">
                <span><i class="fa-brands fa-tiktok"></i> TikTok Resmi</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <!-- Tautan WhatsApp -->
            <a href="https://wa.me/6281234567890?text=Halo%20Admin%20Desa" target="_blank" class="link-btn btn-whatsapp">
                <span><i class="fa-brands fa-whatsapp"></i> Layanan WhatsApp</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

            <!-- Tautan Google Maps -->
            <!-- Silakan ganti href di bawah ini dengan tautan Google Maps koordinat/alamat kantor desa Anda -->
            <a href="https://goo.gl/maps/link-lokasi-desa" target="_blank" class="link-btn btn-maps">
                <span><i class="fa-solid fa-map-location-dot"></i> Lokasi Kantor Desa</span>
                <span class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></span>
            </a>

        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Pemerintah Desa Makmur Jaya. All Rights Reserved.</p>
        </div>
    </div>
    
</body>
</html>
